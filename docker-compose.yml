services:
  mongo:
    image: mongo:7
    container_name: umdb-template-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: umdb
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: umdb-template-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/umdb
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: umdb-template-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
    ports:
      - "5173:5173"

volumes:
  mongo_data:
